    <style>
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(191, 0, 255, 0.03) 0px,
                transparent 1px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 1000;
        }
        .retro-text {
            text-shadow: 2px 2px 0px rgba(191, 0, 255, 0.5);
        }
        /* Mobile app like layout container */
        .main-container {
            max-w-[480px] w-full mx-auto;
        }

        /* Hexagon Universe Styles */
        .hex-outer {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            width: 56px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            margin: 2px;
            cursor: pointer;
        }
        .hex-outer:hover {
            transform: scale(1.15);
            z-index: 20;
        }
        .hex-inner {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            width: 52px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(5, 0, 10, 0.9);
        }

        /* ==============================================================
           5) Graduated Core - Simple Red (Same style as others)
           ============================================================== */

        .hex-bg-graduated {
            /* Matches existing bronze/silver/gold flat styles exactly but red */
            background-color: #ef4444; /* red-500 equivalent */
            box-shadow: shadow-[0_0_15px_rgba(239,68,68,0.6)];
        }

        .hex-inner-graduated-liquid {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            width: 52px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(5, 0, 10, 0.9);
            color: #ef4444; /* red text matching border */
        }

        .hex-outer-graduated {
            z-index: 50;
        }

        .graduation-burst {
            animation: crown-burst 1.2s cubic-bezier(0.19, 1, 0.22, 1) 1;
        }

        @keyframes graduated-flow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes crown-burst {
            0% {
                transform: scale(1.05);
                box-shadow: 0 0 0 rgba(255,255,255,0);
            }
            50% {
                transform: scale(1.16);
                box-shadow: 0 0 26px rgba(255,255,255,0.75), 0 0 36px rgba(0,245,255,0.45);
            }
            100% {
                transform: scale(1.07);
                box-shadow: 0 0 0 rgba(255,255,255,0);
            }
        }

        /* Make the hex wrap nicely */
        .hex-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            margin-left: 12px;
        }
        /* Map Container */
        .map-container {
            cursor: grab;
        }
        .map-container:active {
            cursor: grabbing;
        }

        #map-pane {
            transition: transform 420ms cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }

        #agent-card-panel {
            width: clamp(240px, 30vw, 340px);
            right: clamp(15%, 21vw, 27%);
            transform: translate(120%, -50%);
            opacity: 0;
            pointer-events: none;
            transition: transform 360ms cubic-bezier(0.22, 1, 0.36, 1), opacity 280ms ease-out;
        }

        #arena-shell.focused #map-pane {
            transform: translateX(-8%) scale(0.94);
        }

        #arena-shell.focused #agent-card-panel {
            transform: translate(0, -50%);
            opacity: 1;
            pointer-events: auto;
        }

        .pixel-avatar {
            image-rendering: pixelated;
        }

        @media (max-width: 640px) {
            #arena-shell.focused #map-pane {
                transform: translateX(-15%) scale(0.90);
            }

            #agent-card-panel {
                width: min(78vw, 300px);
                right: 15%;
            }
        }
    </style>

        function buildDefaultDemoState() {

        function normalizeDemoState(raw) {

        const DEMO_STATE_POLL_MS = 900;
        const DEMO_AGENT_18_WALLET = "0xc9350873e737239dc2cac6324439e84a325bd22a";
        const demoVirtualAgents = new Map();
        let demoRuntimeBootstrapped = false;
        let demoHotkeysBound = false;
        let demoHotkeyBusy = false;

        function getTierStyle(score, status) {
            if (Number(status) === 1) return { 
                bg: 'bg-red-500', 
                text: 'text-red-500 font-extrabold',

            if (score >= 100) return { bg: 'bg-neonpurple', text: 'text-neonpurple', shadow: 'shadow-[0_0_15px_rgba(191,0,255,0.8)]', name: 'ASCENDANT' };
            if (score >= 76) return { bg: 'bg-neoncyan', text: 'text-neoncyan', shadow: 'shadow-[0_0_15px_rgba(0,245,255,0.6)]', name: 'DIAMOND' };
            if (score >= 51) return { bg: 'bg-amber-400', text: 'text-amber-400', shadow: 'shadow-[0_0_15px_rgba(251,191,36,0.6)]', name: 'GOLD' };
            if (score >= 26) return { bg: 'bg-slate-300', text: 'text-slate-300', shadow: 'shadow-[0_0_10px_rgba(226,232,240,0.4)]', name: 'SILVER' };
            return { bg: 'bg-neon', text: 'text-neon', shadow: 'shadow-[0_0_10px_rgba(0,255,157,0.4)]', name: 'BRONZE' };

        function triggerBootAnimation() {
            const title = document.getElementById('main-title');
            const badgeWrap = document.getElementById('badge-wrapper');
            
            // Fold the main title
            title.style.maxHeight = "0px";
            title.style.opacity = "0";
            title.style.marginBottom = "0px";
            
            // Show side badge
            setTimeout(() => {
                badgeWrap.classList.remove('hidden');
                setTimeout(() => {
                    badgeWrap.classList.remove('opacity-0');
                    badgeWrap.classList.add('opacity-100');
                }, 50);
            }, 300); // slight delay after fold begins
        }

        // Global dragging state
        let mapX = 0, mapY = 0, mapScale = 1.0;
        let isDragging = false;
        let startX = 0, startY = 0;
        
        function initDragAndDrop() {
            const container = document.getElementById('map-pane');
            const mapEl = document.getElementById('hex-map');
            if (!container || !mapEl) return;

            // Mouse Events
            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX - mapX;
                startY = e.clientY - mapY;
            });
            container.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                mapX = e.clientX - startX;
                mapY = e.clientY - startY;
                mapEl.style.transform = `translate(${mapX}px, ${mapY}px) scale(${mapScale})`;
            });
            window.addEventListener('mouseup', () => { isDragging = false; });
            
            // Touch Events
            let initDist = 0;
            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX - mapX;
                    startY = e.touches[0].clientY - mapY;
                } else if (e.touches.length === 2) {
                    initDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            });
            container.addEventListener('touchmove', (e) => {
                e.preventDefault(); // Prevent scroll
                if (e.touches.length === 1 && isDragging) {
                    mapX = e.touches[0].clientX - startX;
                    mapY = e.touches[0].clientY - startY;
                    mapEl.style.transform = `translate(${mapX}px, ${mapY}px) scale(${mapScale})`;
                } else if (e.touches.length === 2 && initDist > 0) {
                    const currentDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    mapScale += (currentDist - initDist) * 0.005;
                    mapScale = Math.max(0.3, Math.min(mapScale, 3.0));
                    initDist = currentDist;
                    mapEl.style.transform = `translate(${mapX}px, ${mapY}px) scale(${mapScale})`;
                }
            }, { passive: false });
            container.addEventListener('touchend', () => { isDragging = false; initDist = 0; });
            
            // Zoom via Wheel
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                mapScale -= e.deltaY * 0.002;
                mapScale = Math.max(0.3, Math.min(mapScale, 3.0));
                mapEl.style.transform = `translate(${mapX}px, ${mapY}px) scale(${mapScale})`;
            }, { passive: false });
        }

        // Terminal Logger Class (Maintains 3 lines max)
        class TerminalLogger {
            constructor() {
                this.container = document.getElementById('sys-log-container');
                this.lines = [];
                // Initial Logs
                this.log('> sys.connect("VTRegistry")');
                this.log('... [OK] Connected 0x02eDBB...');
            }

            log(text, colorClass = "text-neonpurple") {
                if (this.lines.length >= 3) {
                    const old = this.lines.shift();
                    if (old.parentNode) old.remove();
                }
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 animate-[fade-in_0.2s_ease-out]";
                div.innerHTML = `
                    <span class="text-gray-500">>_</span>
                    <span class="${colorClass}">${text}</span>
                `;
                this.lines.push(div);
                this.container.appendChild(div);
            }
            
            typeLog(text, colorClass = "text-neoncyan") {
                if (this.lines.length >= 3) {
                    const old = this.lines.shift();
                    if (old.parentNode) old.remove();
                }
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 animate-[fade-in_0.2s_ease-out]";
                const cursor = `<span class="animate-pulse">_</span>`;
                div.innerHTML = `
                    <span class="text-gray-500">>_</span>
                    <span class="${colorClass} min-w-0 flex-1 truncate"><span class="typing-text"></span>${cursor}</span>
                `;
                this.lines.push(div);
                this.container.appendChild(div);
                
                const typeArea = div.querySelector('.typing-text');
                let i = 0;
                let intv = setInterval(() => {
                    typeArea.textContent += text.charAt(i);
                    i++;
                    if(i >= text.length) clearInterval(intv);
                }, 30);
            }
        }
        
        const terminal = new TerminalLogger();

        class SoundFX {
            constructor() {
                this.storageKey = 'veriverse.sfx.enabled';
                this.ctx = null;
                this.enabled = this.loadEnabled();
                this.volume = 0.26;
                this.syncMinIntervalMs = 350;
                this.lastSyncAt = 0;
            }

            loadEnabled() {
                try {
                    const raw = localStorage.getItem(this.storageKey);
                    if (raw === null) return true;
                    return raw !== '0';
                } catch (_) {
                    return true;
                }
            }

            setEnabled(nextEnabled) {
                this.enabled = Boolean(nextEnabled);
                try {
                    localStorage.setItem(this.storageKey, this.enabled ? '1' : '0');
                } catch (_) {
                    // Ignore localStorage write failures.
                }
                return this.enabled;
            }

            initContext() {
                if (!this.enabled) return null;
                if (!this.ctx) {
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    if (!Ctx) return null;
                    this.ctx = new Ctx();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume().catch(() => {});
                }
                return this.ctx;
            }

            tone(freq, durationSec, type = 'square', gain = this.volume) {
                if (!this.enabled) return;
                const ctx = this.initContext();
                if (!ctx) return;

                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                osc.connect(g);
                g.connect(ctx.destination);
                g.gain.setValueAtTime(gain, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + durationSec);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + durationSec);
            }

            sequence(notes, intervalSec = 0.075) {
                if (!this.enabled) return;
                notes.forEach((note, idx) => {
                    setTimeout(() => {
                        this.tone(note.f, note.d || 0.06, note.t || 'square', note.g || this.volume);
                    }, idx * intervalSec * 1000);
                });
            }

            clickHex() {
                this.tone(880, 0.045, 'square', this.volume);
            }

            syncUpdate() {
                const now = Date.now();
                if (now - this.lastSyncAt < this.syncMinIntervalMs) return;
                this.lastSyncAt = now;
                this.sequence([
                    { f: 740, d: 0.06, t: 'square', g: this.volume * 1.0 },
                    { f: 988, d: 0.08, t: 'square', g: this.volume * 1.08 }
                ], 0.055);

                    { f: 1318.51, d: 0.16, t: 'square', g: this.volume * 1.2 }
                ], 0.09);
            }

            unlock() {
                this.initContext();
            }
        }

        function ensureCurveState(agentId) {
            if (!curveStateMap.has(agentId)) {

                    loadingPromise: null,

                    stake: [],
                    pendingTrust: [],
                    pendingStake: []

            return curveStateMap.get(agentId);

        function safeToNumber(value, fallback = 0) {
            try {
                const n = Number(value);
                return Number.isFinite(n) ? n : fallback;
            } catch (_) {
                return fallback;
            }
        }

        function shouldBufferCurveEvent(agentId, state) {
            return !state?.loaded;

        function normalizeAgentData(agentLike, overrides = {}) {
            const src = agentLike || {};
            return {
                name: src?.name ?? src?.[0] ?? '',
                creator: src?.creator ?? src?.[1] ?? '0x0000000000000000000000000000000000000000',
                wallet: src?.wallet ?? src?.[2] ?? '',
                trustScore: src?.trustScore ?? src?.[3] ?? 0,
                status: src?.status ?? src?.[4] ?? 0,
                ...overrides
            };

        function formatStakeUnits(rawAmount) {
            try {
                const formatted = ethers.formatUnits(rawAmount, USDT_DECIMALS);
                const n = Number(formatted);
                return Number.isFinite(n) ? n : 0;
            } catch (_) {
                return 0;
            }
        }

        async function getBlockTimestamp(blockNumber) {
            const bn = safeToNumber(blockNumber, -1);
            if (bn < 0) return null;
            if (blockTimestampCache.has(bn)) {
                return blockTimestampCache.get(bn);
            }
            if (!readProvider) return null;

            try {
                const block = await readProvider.getBlock(bn);
                const ts = safeToNumber(block?.timestamp, null);
                blockTimestampCache.set(bn, ts);
                if (blockTimestampCache.size > BLOCK_TS_CACHE_MAX) {
                    const oldestKey = blockTimestampCache.keys().next().value;
                    if (oldestKey !== undefined) {
                        blockTimestampCache.delete(oldestKey);
                    }
                }
                return ts;
            } catch (_) {
                return null;
            }
        }

        function sortLogs(logs) {
            return [...logs].sort((a, b) => {
                const ba = safeToNumber(a?.blockNumber, 0);
                const bb = safeToNumber(b?.blockNumber, 0);
                if (ba !== bb) return ba - bb;
                const ia = safeToNumber(a?.index, safeToNumber(a?.logIndex, 0));
                const ib = safeToNumber(b?.index, safeToNumber(b?.logIndex, 0));
                return ia - ib;
            });
        }

        async function fetchTrustHistoryFromIndexer(agentId) {
            if (!TRUST_SUBGRAPH_URL) return [];

            const query = `
                query TrustHistory($agentId: BigInt!, $first: Int!, $skip: Int!) {
                    trustUpdateds(
                        first: $first,
                        skip: $skip,
                        where: { agentId: $agentId },
                        orderBy: block_number,
                        orderDirection: asc
                    ) {
                        id
                        agentId
                        newScore
                        block_number
                        timestamp_
                        transactionHash_
                    }
                }
            `;
            const allRows = [];

            for (let page = 0; page < TRUST_HISTORY_MAX_PAGES; page += 1) {
                const skip = page * TRUST_HISTORY_PAGE_SIZE;
                const response = await fetch(TRUST_SUBGRAPH_URL, {
                    method: 'POST',
                    headers: {
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        query,
                        variables: {
                            agentId: String(agentId),
                            first: TRUST_HISTORY_PAGE_SIZE,
                            skip
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`Subgraph HTTP ${response.status}`);
                }

                const payload = await response.json();
                if (payload?.errors?.length) {
                    throw new Error(payload.errors.map((e) => e?.message || 'subgraph error').join('; '));
                }

                const rows = payload?.data?.trustUpdateds;
                const normalizedRows = Array.isArray(rows) ? rows : [];
                allRows.push(...normalizedRows);

                if (normalizedRows.length < TRUST_HISTORY_PAGE_SIZE) {
                    break;
                }
            }

            return allRows;
        }

        async function buildTrustCurve(agentId) {
            const mock = getCurveMockForAgent(agentId);
            if (mock?.trust?.length) {
                return mock.trust;
            }

            if (TRUST_HISTORY_MODE === 'legacy') {
                const latestLegacy = existingAgentsMap.get(agentId);
                return [{
                    x: 0,
                    y: safeToNumber(latestLegacy?.trustScore, 0),
                    blockNumber: null,
                    timestamp: null,
                    eventType: 'snapshot-legacy-fallback',
                    curve: 'trust'
                }];
            }

            const points = [];
            let x = 0;

            try {
                const rows = await fetchTrustHistoryFromIndexer(agentId);
                for (const row of rows) {
                    points.push({
                        x,
                        y: safeToNumber(row?.newScore, 0),
                        blockNumber: safeToNumber(row?.block_number, null),
                        timestamp: safeToNumber(row?.timestamp_, null),
                        eventType: 'trust-updated-indexed',
                        curve: 'trust',
                        txHash: row?.transactionHash_ || null
                    });
                    x += 1;
                }
            } catch (error) {
                console.warn(`[TrustIndexer] history query failed for agent #${agentId}`, error);
                // Fall through to snapshot fallback.
            }

            if (!points.length) {
                const latest = existingAgentsMap.get(agentId);
                points.push({
                    x: 0,
                    y: safeToNumber(latest?.trustScore, 0),
                    blockNumber: null,
                    timestamp: null,
                    eventType: 'snapshot-indexer-fallback',
                    curve: 'trust'
                });
            }

            return points;
        }

        async function buildStakeCurve(agentId) {
            const mock = getCurveMockForAgent(agentId);
            if (mock?.stake?.length) {
                return mock.stake;
            }

            const points = [];
            if (!readEscrowContract) return points;

            let x = 0;
            let runningTotal = 0;
            points.push({
                x,
                y: 0,
                blockNumber: null,
                timestamp: null,
                eventType: 'baseline',
                curve: 'stake',
                delta: 0
            });
            x += 1;

            try {
                const investLogs = await readEscrowContract.queryFilter(
                    readEscrowContract.filters.Invested(agentId),
                    0,
                    "latest"
                );

                for (const log of sortLogs(investLogs)) {
                    const rawAmount = log?.args?.amount ?? log?.args?.[2] ?? 0;
                    runningTotal += formatStakeUnits(rawAmount);
                    const bn = safeToNumber(log?.blockNumber, null);
                    const ts = await getBlockTimestamp(bn);
                    points.push({
                        x,
                        y: Number(runningTotal.toFixed(6)),
                        blockNumber: bn,
                        timestamp: ts,
                        eventType: 'invested',
                        curve: 'stake',
                        delta: Number(formatStakeUnits(rawAmount).toFixed(6))
                    });
                    x += 1;
                }
            } catch (_) {
                // Keep snapshot fallback below.
            }

            if (points.length === 1) {
                try {
                    const escrow = await readEscrowContract.getEscrow(agentId);
                    const snapshotTotal = formatStakeUnits(escrow?.totalAmount ?? escrow?.[0] ?? 0);
                    if (snapshotTotal > 0) {
                        points.push({
                            x,
                            y: Number(snapshotTotal.toFixed(6)),
                            blockNumber: null,
                            timestamp: null,
                            eventType: 'escrow-snapshot',
                            curve: 'stake',
                            delta: Number(snapshotTotal.toFixed(6))
                        });
                    }
                } catch (_) {
                    // Ignore snapshot errors.
                }
            }

            return points;
        }

        async function loadAgentCurves(agentId) {
            const state = ensureCurveState(agentId);
            if (state.loaded) return state;
            if (state.loadingPromise) {
                await state.loadingPromise;
                return state;
            }

            state.loadingPromise = (async () => {
                const [trustPoints, stakePoints] = await Promise.all([
                    buildTrustCurve(agentId),
                    buildStakeCurve(agentId)
                ]);
                state.trust = trustPoints;
                state.stake = stakePoints;
                state.loaded = true;
                await flushPendingCurveEvents(agentId);
            })();

            try {
                await state.loadingPromise;
            } finally {
                state.loadingPromise = null;
            }
            return state;
        }

        async function flushPendingCurveEvents(agentId) {
            const state = ensureCurveState(agentId);
            if (!state.loaded) return;

            const trustQueue = Array.isArray(state.pendingTrust)
                ? state.pendingTrust.splice(0, state.pendingTrust.length)
                : [];

            for (const item of trustQueue) {
                await appendTrustCurvePoint(agentId, item?.score, item?.blockNumber);
            }

            const stakeQueue = Array.isArray(state.pendingStake)
                ? state.pendingStake.splice(0, state.pendingStake.length)
                : [];

            for (const item of stakeQueue) {
                if (item?.type === 'invested') {
                    await appendStakeCurvePoint(agentId, item?.rawAmount, item?.blockNumber);
                } else if (item?.type === 'settled') {
                    await appendStakeSettlePoint(agentId, item?.blockNumber);
                }
            }
        }

        async function appendTrustCurvePoint(agentId, score, blockNumber) {
            const state = ensureCurveState(agentId);
            if (!state.loaded) {
                if (shouldBufferCurveEvent(agentId, state)) {
                    state.pendingTrust.push({
                        score: safeToNumber(score, 0),
                        blockNumber: safeToNumber(blockNumber, null)
                    });
                }
                return;
            }

            const lastPoint = state.trust[state.trust.length - 1];
            const lastY = lastPoint ? safeToNumber(lastPoint.y, 0) : null;
            if (lastY !== null && lastY === safeToNumber(score, 0)) {
                return;
            }

            const x = lastPoint ? safeToNumber(lastPoint.x, 0) + 1 : 0;
            const ts = await getBlockTimestamp(blockNumber);
            state.trust.push({
                x,
                y: safeToNumber(score, 0),
                blockNumber: safeToNumber(blockNumber, null),
                timestamp: ts,
                eventType: 'trust-updated-live',
                curve: 'trust'
            });

            if (selectedAgentId === agentId) {
                renderAgentCurves(agentId);
            }
        }

        async function appendStakeCurvePoint(agentId, rawAmount, blockNumber) {
            const state = ensureCurveState(agentId);
            if (!state.loaded) {
                if (shouldBufferCurveEvent(agentId, state)) {
                    state.pendingStake.push({
                        type: 'invested',
                        rawAmount,
                        blockNumber: safeToNumber(blockNumber, null)
                    });
                }
                return;
            }

            const lastPoint = state.stake[state.stake.length - 1];
            const normalizedBlock = safeToNumber(blockNumber, null);
            if (
                lastPoint &&
                normalizedBlock !== null &&
                safeToNumber(lastPoint?.blockNumber, null) === normalizedBlock &&
                lastPoint?.eventType === 'invested-live'
            ) {
                return;
            }
            const prev = lastPoint ? safeToNumber(lastPoint.y, 0) : 0;
            const next = Number((prev + formatStakeUnits(rawAmount)).toFixed(6));
            const x = lastPoint ? safeToNumber(lastPoint.x, 0) + 1 : 0;
            const ts = await getBlockTimestamp(normalizedBlock);
            const delta = Number(formatStakeUnits(rawAmount).toFixed(6));
            state.stake.push({
                x,
                y: next,
                blockNumber: normalizedBlock,
                timestamp: ts,
                eventType: 'invested-live',
                curve: 'stake',
                delta
            });

            if (selectedAgentId === agentId) {
                renderAgentCurves(agentId);
            }
        }

        async function appendStakeSettlePoint(agentId, blockNumber) {
            const state = ensureCurveState(agentId);
            if (!state.loaded) {
                if (shouldBufferCurveEvent(agentId, state)) {
                    state.pendingStake.push({
                        type: 'settled',
                        blockNumber: safeToNumber(blockNumber, null)
                    });
                }
                return;
            }

            const lastPoint = state.stake[state.stake.length - 1];
            const normalizedBlock = safeToNumber(blockNumber, null);
            if (
                lastPoint &&
                normalizedBlock !== null &&
                safeToNumber(lastPoint?.blockNumber, null) === normalizedBlock &&
                lastPoint?.eventType === 'settled-live'
            ) {
                return;
            }
            const current = lastPoint ? safeToNumber(lastPoint.y, 0) : 0;
            const x = lastPoint ? safeToNumber(lastPoint.x, 0) + 1 : 0;
            const ts = await getBlockTimestamp(normalizedBlock);
            state.stake.push({
                x,
                y: current,
                blockNumber: normalizedBlock,
                timestamp: ts,
                eventType: 'settled-live',
                curve: 'stake',
                delta: 0
            });

            if (selectedAgentId === agentId) {
                renderAgentCurves(agentId);
            }
        }

        // Organic Centered Coordinate Generator
        function generateOrganicCoordinates(n) {
            let coords = [];
            const W = 58;  // horizontal spacing + gap
            const H = 50;  // vertical spacing + gap
            
            let radius = Math.ceil(Math.sqrt(n));
            for (let r = -radius; r <= radius; r++) {
                for (let q = -radius; q <= radius; q++) {
                    const x = q * W + (Math.abs(r) % 2 === 1 ? W/2 : 0);
                    const y = r * H;
                    const dist = Math.sqrt(x*x + y*y);
                    coords.push({x, y, dist});
                }
            }
            
            // Sort by distance + little random noise for organic organic growth look
            coords.sort((a,b) => (a.dist + Math.random()*20) - (b.dist + Math.random()*20));
            return coords.slice(0, n);
        }

        async function fetchAgents() {
            try {
                initDragAndDrop();
                initCardPanelInteractions();
                bindDemoPageHotkeys();
                const bootFlowStartAt = Date.now();
                
                readProvider = new ethers.JsonRpcProvider(HTTP_RPC_URL);
                readContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, readProvider);
                readEscrowContract = new ethers.Contract(ESCROW_CONTRACT_ADDRESS, ESCROW_ABI, readProvider);
                liveProvider = null;
                liveContract = null;
                liveEscrowContract = null;
                usingWsRealtime = false;
                
                const nextIdBN = await readContract.nextAgentId();
                const totalAgents = Math.max(0, Number(nextIdBN) - 1);
                lastAgentId = totalAgents;
                
                // Clear loading
                const mapEl = document.getElementById('hex-map');
                mapEl.innerHTML = '';
                
                terminal.log(`[SYS] Mapping ${totalAgents} nodes...`, "text-neoncyan");

                if (totalAgents === 0) {
                    mapEl.innerHTML = '<div class="absolute text-gray-500 font-sans text-[10px] w-[200px] text-center -ml-[100px] -mt-[10px]">No Data Pulses Detected</div>';
                    terminal.log('[ERR] No Data Pulses Detected', "text-red-500");
                    await bootstrapDemoStateRuntime();
                    startDemoStateWatcher();
                    startRadar(); // Even if 0, wait for new pulses
                    return;
                }

                // Fetch all agent data sequentially to avoid RPC rate limiting on public endpoints
                const agentPromises = [];
                for (let i = 1; i <= totalAgents; i++) {
                    try {
                        const a = await readContract.getAgent(i);
                        const normalizedAgent = normalizeAgentData(a);
                        agentPromises.push({ id: i, data: normalizedAgent });
                        existingAgentsMap.set(i, normalizedAgent);
                    } catch (e) {
                        console.error('Failed ID', i, e);
                    }
                }

                rawAgents = agentPromises;
                
                // Shuffle array to scatter high scores organically
                rawAgents.sort(() => Math.random() - 0.5);
                coordsCache = generateOrganicCoordinates(rawAgents.length);

                if (totalAgents >= 1) {
                    const elapsed = Date.now() - bootFlowStartAt;
                    const holdForIntro = Math.max(0, BOOT_HOLD_MIN_MS - elapsed);
                    if (holdForIntro > 0) {
                        await new Promise(r => setTimeout(r, holdForIntro));
                    }
                    triggerBootAnimation();
                    await new Promise(r => setTimeout(r, BOOT_TO_FIRST_HEX_MS));
                }
                
                // Render them onto the map
                for (let idx = 0; idx < rawAgents.length; idx++) {
                    try {
                        renderHexagon(rawAgents[idx], coordsCache[idx], mapEl);
                    } catch (e) {
                        console.error(`Render fail #${rawAgents[idx].id}`, e);
                    }
                }
                
                // Find the max animation delay
                let maxDelay = 0;
                coordsCache.forEach(c => {
                    const delay = c.dist * HEX_ENTRANCE_DISTANCE_FACTOR + HEX_ENTRANCE_BASE_DELAY_MS;
                    if(delay > maxDelay) maxDelay = delay;
                });
                
                setTimeout(async () => {
                    await bootstrapDemoStateRuntime();
                    startDemoStateWatcher();
                    terminal.log("[OK] MAP INITIALIZED", "text-neon");
                    terminal.typeLog("", "text-neoncyan"); // Empty prompt blinking
                    startRadar();
                }, maxDelay + 500);

            } catch (err) {
                console.error(err);
                terminal.log("[ERR] SENSOR FAIL", "text-red-500");
            }
        }

        async function getDicebearModules() {
            if (!avatarModulePromise) {
                avatarModulePromise = Promise.all([
                    import('https://esm.sh/@dicebear/core@9.4.2'),
                    import('https://esm.sh/@dicebear/pixel-art@9.4.2')
                ]);

        function svgToDataUrl(svg) {
            return `data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svg)))}`;
        }

        async function getPixelAvatarDataUrl(address) {
            const key = (address || 'unknown').toLowerCase();
            if (avatarDataUrlCache.has(key)) {
                return avatarDataUrlCache.get(key);
            }

            const seed = getAvatarSeed(key);

            try {
                const [coreMod, pixelArtMod] = await getDicebearModules();
                const createAvatar = coreMod.createAvatar;
                const pixelArtStyle = pixelArtMod.pixelArt || pixelArtMod.default || pixelArtMod;

                const avatar = createAvatar(pixelArtStyle, {
                    seed,
                    size: 120,
                    backgroundColor: ['0a0a0a']
                });

                const dataUrl = svgToDataUrl(avatar.toString());
                avatarDataUrlCache.set(key, dataUrl);
                return dataUrl;
            } catch (error) {
                console.warn('DiceBear import failed, fallback to hosted avatar', error);
                const fallback = `https://api.dicebear.com/9.x/pixel-art/svg?seed=${seed}&backgroundColor=0a0a0a`;
                avatarDataUrlCache.set(key, fallback);
                return fallback;
            }
        }

        async function upsertAgentFromChain(agentId, sourceLabel) {
            if (!readContract) return;

            try {
                const virtualDemoAgent = demoVirtualAgents.get(Number(agentId));
                const chainAgent = virtualDemoAgent
                    ? normalizeAgentData(virtualDemoAgent)
                    : normalizeAgentData(await readContract.getAgent(agentId));
                const existed = existingAgentsMap.has(agentId);

                if (!existed) {
                    const agentObj = { id: agentId, data: chainAgent };
                    syncAgentState(agentId, chainAgent);
                    rawAgents.push(agentObj);
                    coordsCache = generateOrganicCoordinates(rawAgents.length);

                    const mapEl = document.getElementById('hex-map');
                    const newCoord = coordsCache[rawAgents.length - 1];
                    renderHexagon(agentObj, newCoord, mapEl);
                    lastAgentId = Math.max(lastAgentId, agentId);
                    terminal.log(`[SYS] NODE #${agentId} DEPLOYED (${sourceLabel})`, "text-neon");
                } else {
                    const oldAgent = existingAgentsMap.get(agentId);
                    const oldScore = Number(oldAgent.trustScore);
                    const newScore = Number(chainAgent.trustScore);
                    const oldStatus = Number(oldAgent.status);
                    const newStatus = Number(chainAgent.status);
                    
                    const isGraduating = oldStatus === 0 && newStatus === 1;

                    syncAgentState(agentId, chainAgent);
                    refreshAgentVisual(agentId, newScore, newStatus, isGraduating, oldScore !== newScore || oldStatus !== newStatus);

                    if (isGraduating) {
                        terminal.log(`[ALERT] NODE #${agentId} SUCCESSFULLY GRADUATED FROM SYSTEM!`, "bg-yellow-400 text-black p-1 animate-pulse font-bold");
                    } else if (oldScore !== newScore || oldStatus !== newStatus) {
                        terminal.log(`[SYS] NODE #${agentId} UPDATED (${sourceLabel}) ${oldScore} -> ${newScore}`, "text-yellow-400");
                    }
                }

                refreshSelectedHudIfNeeded(agentId, chainAgent);
            } catch (error) {
                console.warn(`Failed to upsert agent #${agentId} from chain`, error);
            }
        }

        function getLegacyMockTail(agentId, curveKey, fallbackValue) {
            if (TRUST_HISTORY_MODE !== 'legacy') return fallbackValue;
            const mock = getCurveMockForAgent(agentId);
            if (!mock) return fallbackValue;
            const points = curveKey === 'stake' ? mock.stake : mock.trust;
            const last = Array.isArray(points) && points.length > 0 ? points[points.length - 1] : null;
            return safeToNumber(last?.y, fallbackValue);
        }

        function bindRealtimeEventHandlers() {
            if (!liveContract) return;

            liveContract.removeAllListeners("AgentRegistered");
            liveContract.removeAllListeners("TrustUpdated");
            liveContract.removeAllListeners("StatusChanged");
            if (liveEscrowContract) {
                liveEscrowContract.removeAllListeners("Invested");
                liveEscrowContract.removeAllListeners("Settled");
            }

            liveContract.on("AgentRegistered", async (agentId) => {
                await handleAgentRegisteredEvent(agentId, "EVENT:REGISTERED");
            });

            liveContract.on("TrustUpdated", async (agentId, newScore, eventPayload) => {
                const blockNo = safeToNumber(
                    eventPayload?.log?.blockNumber ?? eventPayload?.blockNumber ?? latestBlockNumber,
                    null
                );
                await handleTrustUpdatedEvent(agentId, newScore, blockNo);
            });

            liveContract.on("StatusChanged", async (agentId, newStatus) => {
                await handleStatusChangedEvent(agentId, newStatus);
            });

            if (liveEscrowContract) {
                liveEscrowContract.on("Invested", async (agentId, _backer, amount, eventPayload) => {
                    const blockNo = safeToNumber(
                        eventPayload?.log?.blockNumber ?? eventPayload?.blockNumber ?? latestBlockNumber,
                        null
                    );
                    await handleInvestedEvent(agentId, amount, blockNo);
                });

                liveEscrowContract.on("Settled", async (agentId, status, eventPayload) => {
                    const blockNo = safeToNumber(
                        eventPayload?.log?.blockNumber ?? eventPayload?.blockNumber ?? latestBlockNumber,
                        null
                    );
                    await handleSettledEvent(agentId, status, blockNo);
                });
            }
        }

        function hasEnabledDemoStep(state) {
            if (!state || !state.steps) return false;
            return Object.values(state.steps).some((flag) => Boolean(flag));
        }

        function createDemoAgent18Snapshot() {
            return normalizeAgentData({
                name: 'Veri #2',
                wallet: DEMO_AGENT_18_WALLET,
                trustScore: 0,
                status: 0
            });
        }

        async function applyDemoLaunchStep() {
            const agentId = 18;
            if (!demoVirtualAgents.has(agentId)) {
                demoVirtualAgents.set(agentId, createDemoAgent18Snapshot());
            }
            await handleAgentRegisteredEvent(agentId, 'Veri #2', {
                withEventLog: true,
                withSound: true
            });
        }

        async function applyDemoInvestStep() {
            const amount = ethers.parseUnits('0.05', 6);
            await handleInvestedEvent(17, amount, null, {
                withEventLog: true,
                withSound: true
            });
        }

        async function applyDemoChallengeStep() {
            const current = existingAgentsMap.get(17);
            const baselineTrust = getLegacyMockTail(17, 'trust', safeToNumber(current?.trustScore, 0));
            const nextTrust = baselineTrust + 25;
            await handleTrustUpdatedEvent(17, nextTrust, null, {
                withEventLog: true,
                withSound: true,
                withReconcile: false
            });
        }

        async function applyDemoGraduateStep() {
            await handleStatusChangedEvent(17, 1, {
                withEventLog: true,
                withSound: true,
                withReconcile: false
            });
            await handleSettledEvent(17, 1, null, {
                withEventLog: true,
                withSound: true
            });
        }

        async function resetDemoRuntimeOverlay() {
            demoVirtualAgents.delete(18);

            if (existingAgentsMap.has(18)) {
                existingAgentsMap.delete(18);
            }
            if (Array.isArray(rawAgents) && rawAgents.length > 0) {
                rawAgents = rawAgents.filter((entry) => Number(entry?.id) !== 18);
            }

            const node18 = document.getElementById('hex-node-18');
            if (node18) {
                node18.remove();
            }

            if (selectedAgentId === 18) {
                closeAgentCardPanel();
            }

            const existing17 = existingAgentsMap.get(17);
            if (existing17) {
                const baselineTrust = getLegacyMockTail(17, 'trust', safeToNumber(existing17?.trustScore, 0));
                const patched = normalizeAgentData(existing17, {
                    trustScore: baselineTrust,
                    status: 0
                });
                syncAgentState(17, patched);
                refreshAgentVisual(17, Number(patched.trustScore), 0, false, true);
                if (selectedAgentId === 17) {
                    focusHudOnAgent(17, patched);
                }
            }

            curveStateMap.delete(17);
            curveStateMap.delete(18);
            if (selectedAgentId === 17) {
                await loadAgentCurves(17);
                renderAgentCurves(17);
            }
        }

        async function applyDemoStateTransition(prevState, nextState) {
            const orderedSteps = [
                'launch_veri2_agent18',
                'invest_agent17_usdt_0_05',
                'challenge_agent17_trust_plus25',
                'graduate_agent17'
            ];

            const prev = normalizeDemoState(prevState);
            const next = normalizeDemoState(nextState);
            const nextEnabled = next.enabled && hasEnabledDemoStep(next);

            let effectivePrev = { ...prev.steps };
            const stepTurnedOff = orderedSteps.some((step) => prev.steps[step] && !next.steps[step]);
            const hadRuntimeOverlay =
                demoVirtualAgents.size > 0 ||
                existingAgentsMap.has(18) ||
                (prev.enabled && hasEnabledDemoStep(prev));

            if ((!nextEnabled && hadRuntimeOverlay) || stepTurnedOff) {
                await resetDemoRuntimeOverlay();
                effectivePrev = buildDefaultDemoState().steps;
            }

            if (!nextEnabled) {
                return;
            }

            const launchNodeMissing =
                next.steps.launch_veri2_agent18 &&
                (!existingAgentsMap.has(18) || !document.getElementById('hex-node-18'));

            if (launchNodeMissing) {
                demoVirtualAgents.delete(18);
                existingAgentsMap.delete(18);
                if (Array.isArray(rawAgents)) {
                    rawAgents = rawAgents.filter((entry) => Number(entry?.id) !== 18);
                }
                curveStateMap.delete(18);
                effectivePrev.launch_veri2_agent18 = false;
            }

            for (const step of orderedSteps) {
                if (!next.steps[step] || effectivePrev[step]) continue;

                if (step === 'launch_veri2_agent18') {
                    await applyDemoLaunchStep();
                } else if (step === 'invest_agent17_usdt_0_05') {
                    await applyDemoInvestStep();
                } else if (step === 'challenge_agent17_trust_plus25') {
                    await applyDemoChallengeStep();
                } else if (step === 'graduate_agent17') {
                    await applyDemoGraduateStep();
                }
            }
        }

        async function fetchDemoStateFromJson() {
            const url = `${DEMO_STATE_JSON_URL}?v=${Date.now()}`;
            const response = await fetch(url, { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`demo_state.json load failed: ${response.status}`);
            }
            const payload = await response.json();
            return normalizeDemoState(payload);
        }

        async function pollDemoStateChanges() {
            try {
                const incoming = await fetchDemoStateFromJson();
                const revisionChanged = incoming.revision !== lastDemoRevision || incoming.updatedAt !== DEMO_STATE.updatedAt;
                if (!revisionChanged) return;

                const previous = DEMO_STATE;
                DEMO_STATE = incoming;
                lastDemoRevision = incoming.revision;
                await applyDemoStateTransition(previous, incoming);
            } catch (error) {
                // Keep silent to avoid terminal spam when local static server has stale cache gaps.
            }
        }

        async function bootstrapDemoStateRuntime() {
            if (demoRuntimeBootstrapped) return;
            demoRuntimeBootstrapped = true;

            try {
                const loaded = await fetchDemoStateFromJson();
                const baseline = buildDefaultDemoState();
                DEMO_STATE = loaded;
                lastDemoRevision = loaded.revision;
                await applyDemoStateTransition(baseline, loaded);
            } catch (_) {
                await applyDemoStateTransition(buildDefaultDemoState(), DEMO_STATE);
            }
        }

        function startDemoStateWatcher() {
            if (demoStatePollTimer) {
                clearInterval(demoStatePollTimer);
                demoStatePollTimer = null;
            }

            demoStatePollTimer = setInterval(() => {
                pollDemoStateChanges();
            }, DEMO_STATE_POLL_MS);
        }

        function isTypingTarget(target) {
            if (!target) return false;
            if (target.isContentEditable) return true;
            const tag = String(target.tagName || '').toLowerCase();
            return tag === 'input' || tag === 'textarea' || tag === 'select';
        }

        function getDemoHotkeyAction(event) {
            if (!event || !event.ctrlKey || event.altKey || event.metaKey) return null;
            if (event.repeat) return null;
            if (isTypingTarget(event.target)) return null;

            const key = String(event.key || '').toLowerCase();
            if (key === 'z') return 'launch_veri2_agent18';
            if (key === 'x') return 'invest_agent17_usdt_0_05';
            if (key === 'c') return 'challenge_agent17_trust_plus25';
            if (key === 'v') return 'graduate_agent17';
            if (key === 'b') return 'reset';
            return null;
        }

        async function applyDemoHotkeyAction(action) {
            if (demoHotkeyBusy) return;

            demoHotkeyBusy = true;
            try {
                const previous = normalizeDemoState(DEMO_STATE);
                let next;

                if (action === 'reset') {
                    next = buildDefaultDemoState();
                } else {
                    next = normalizeDemoState(DEMO_STATE);
                    next.enabled = true;
                    next.steps[action] = true;
                }

                DEMO_STATE = normalizeDemoState(next);
                window.__VERIVERSE_DEMO_STATE__ = DEMO_STATE;
                await applyDemoStateTransition(previous, DEMO_STATE);
            } catch (_) {
            } finally {
                demoHotkeyBusy = false;
            }
        }

        function bindDemoPageHotkeys() {
            if (demoHotkeysBound) return;
            demoHotkeysBound = true;

            document.addEventListener('keydown', (event) => {
                const action = getDemoHotkeyAction(event);
                if (!action) return;
                event.preventDefault();
                event.stopPropagation();
                applyDemoHotkeyAction(action);
            });

        }

        async function runReconnectBackfill() {
            if (!readContract) return;

            try {
                const nextIdBN = await readContract.nextAgentId();
                const totalAgents = Math.max(0, Number(nextIdBN) - 1);
                if (totalAgents === 0) return;

                for (let i = 1; i <= totalAgents; i++) {
                    await upsertAgentFromChain(i, "BACKFILL");
                }

                lastAgentId = Math.max(lastAgentId, totalAgents);
            } catch (error) {
                console.warn("Backfill sync failed", error);
            }
        }

        function attachWsLifecycleHooks() {
            if (!usingWsRealtime || !liveProvider || !liveProvider.websocket) return;

            const ws = liveProvider.websocket;
            ws.onclose = () => {
                terminal.log("[WARN] WS CHANNEL CLOSED, RECONNECTING...", "text-red-400");
                restoreConnection();
            };
            ws.onerror = () => {
                terminal.log("[WARN] WS CHANNEL ERROR DETECTED", "text-red-400");
            };
        }

        async function doRadarSweep(checkOldIdx) {
            if(!readContract) return checkOldIdx;
            
            try {
                // 1. Radar Ping for new agents
                const nextIdBN = await readContract.nextAgentId();
                const newTotal = Math.max(0, Number(nextIdBN) - 1);
                
                if (newTotal > lastAgentId) {
                    // NEW AGENTS FOUND
                    terminal.log(`[ALERT] NEW SIGNALS DETECTED`, "text-red-500 animate-pulse");
                    playAgentLaunchSfx();
                    for (let n = lastAgentId + 1; n <= newTotal; n++) {
                        try {
                            await upsertAgentFromChain(n, "BLOCK:REGISTERED");
                        } catch (err) {
                            console.error('Failed to parse new agent', n);
                        }
                    }
                    lastAgentId = newTotal;
                } else if (lastAgentId > 0) {
                    // 2. Light verify existing agent points
                    const checkId = checkOldIdx;
                    checkOldIdx++;
                    if (checkOldIdx > lastAgentId) checkOldIdx = 1;
                    
                    const oldA = existingAgentsMap.get(checkId);
                    if (oldA) {
                        const currentA = await readContract.getAgent(checkId);
                        const oldScore = Number(oldA.trustScore);
                        const newScore = Number(currentA.trustScore);
                        const oldStatus = Number(oldA.status);
                        const newStatus = Number(currentA.status);
                        
                        const isGraduating = oldStatus === 0 && newStatus === 1;

                        // If score changed
                        if (oldScore !== newScore || oldStatus !== newStatus) {
                            playSyncSfx();
                            if (isGraduating) {
                                 playGraduationSfx();
                                 terminal.log(`[ALERT] NODE #${checkId} SUCCESSFULLY GRADUATED FROM SYSTEM!`, "bg-yellow-400 text-black p-1 animate-pulse font-bold");
                            } else {
                                terminal.log(`[SYS] NODE #${checkId} SCORE UPDATED: ${oldScore} -> ${newScore}`, "text-yellow-400");
                            }
                            syncAgentState(checkId, currentA);
                            refreshAgentVisual(checkId, newScore, newStatus, isGraduating, true);

                            refreshSelectedHudIfNeeded(checkId, currentA);
                        }
                    }
                }
            } catch(e) {
                console.warn("Radar sweep failed", e);
            }
            return checkOldIdx;
        }

        async function initLiveConnection() {
            if (liveProvider) {
                try {
                    liveProvider.removeAllListeners();
                } catch (_) {}
                try {
                    if (typeof liveProvider.destroy === "function") {
                        liveProvider.destroy();
                    }
                } catch (_) {}
            }

            try {
                const wsProvider = new ethers.WebSocketProvider(WS_RPC_URL);
                latestBlockNumber = await wsProvider.getBlockNumber();
                liveProvider = wsProvider;
                liveContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, liveProvider);
                liveEscrowContract = new ethers.Contract(ESCROW_CONTRACT_ADDRESS, ESCROW_ABI, liveProvider);
                usingWsRealtime = true;
                terminal.log("[SYS] RADAR CHANNEL: WEBSOCKET", "text-neonpurple");
            } catch (wsError) {
                console.warn("WS live channel unavailable, fallback to HTTP", wsError);
                liveProvider = new ethers.JsonRpcProvider(HTTP_RPC_URL);
                try {
                    latestBlockNumber = await liveProvider.getBlockNumber();
                } catch (_) {
                    latestBlockNumber = '--';
                }
                liveContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, liveProvider);
                liveEscrowContract = new ethers.Contract(ESCROW_CONTRACT_ADDRESS, ESCROW_ABI, liveProvider);
                usingWsRealtime = false;
                terminal.log("[SYS] RADAR CHANNEL: HTTP FALLBACK", "text-yellow-400");
            }
        }

        async function restoreConnection() {
            if (radarStartInProgress) return;
            try {
                if(liveProvider) liveProvider.removeAllListeners("block");
                await startRadar();
                terminal.log("[SYS] RADAR RE-ALIGNED", "text-neonpurple");
            } catch(e) {
                console.warn("Watchdog reconnection failed", e);
            }
        }

        async function startRadar() {
            if (radarStartInProgress) return;
            radarStartInProgress = true;

            try {
            if(pollingInterval) clearInterval(pollingInterval);
            if(watchdogTimer) clearInterval(watchdogTimer);
            if(liveProvider) liveProvider.removeAllListeners("block");
            if(liveContract) {
                liveContract.removeAllListeners("AgentRegistered");
                liveContract.removeAllListeners("TrustUpdated");
                liveContract.removeAllListeners("StatusChanged");
            }
            if(liveEscrowContract) {
                liveEscrowContract.removeAllListeners("Invested");
                liveEscrowContract.removeAllListeners("Settled");
            }

            await initLiveConnection();
            if(!liveProvider || !liveContract) {
                console.warn("No live provider available for radar");
                return;
            }

            lastBlockTime = Date.now();

            // Reconcile chain state before entering realtime loop
            let checkOldIdx = 1;
            if (radarBootstrapped) {
                await runReconnectBackfill();
            } else {
                checkOldIdx = await doRadarSweep(checkOldIdx);
                radarBootstrapped = true;
            }

            if (usingWsRealtime) {
                bindRealtimeEventHandlers();
                attachWsLifecycleHooks();

                // Keep block heartbeat for watchdog health checks while updates come from events
                liveProvider.on("block", (blockNumber) => {
                    lastBlockTime = Date.now();
                    latestBlockNumber = blockNumber;
                    updateCardSyncLabel();
                });

                terminal.log("[SYS] REALTIME MODE: WS EVENTS", "text-neoncyan");
            } else {
                // Fallback path: block-driven sweep on HTTP provider
                liveProvider.on("block", async (blockNumber) => {
                    lastBlockTime = Date.now();
                    latestBlockNumber = blockNumber;
                    updateCardSyncLabel();
                    checkOldIdx = await doRadarSweep(checkOldIdx);
                });

                terminal.log("[SYS] REALTIME MODE: HTTP BLOCK SWEEP", "text-yellow-400");
            }

            // Watchdog: if no block heartbeat, reconnect radar channel
            watchdogTimer = setInterval(() => {
                if(Date.now() - lastBlockTime > 30000) {
                    terminal.log("[WARN] RADAR LOST SIGNAL, RETRYING...", "text-red-400");
                    restoreConnection();
                }
            }, 10000);
            } finally {
                radarStartInProgress = false;
            }
        }
    </script>
